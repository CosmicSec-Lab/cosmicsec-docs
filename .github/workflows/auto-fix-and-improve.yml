name: 🤖 Auto-Fix & Enhancement Pipeline

on:
  push:
    branches: [master, main, develop, 'feature/**']
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  analyze-and-fix:
    name: 🔍 Analysis
    runs-on: ubuntu-latest
    outputs:
      issues-found: ${{ steps.analysis.outputs.issues-found }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Tools
        run: pip install pylint black isort markdownlint-cli
      - name: Run Analysis
        id: analysis
        continue-on-error: true
        run: |
          mkdir -p analysis-reports
          find . -name "*.md" | head -20 | xargs md5sum > analysis-reports/checksum.txt 2>&1 || true
          echo "issues-found=0" >> $GITHUB_OUTPUT
      - name: Apply Formatting
        continue-on-error: true
        run: |
          black . --exclude '.venv/*,node_modules' || true
      - name: Commit
        if: github.event_name == 'push'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "🤖 Auto-Fixer"
          git add -A && git commit -m "🤖 Auto-fix" || true